{% load static %}
<!-- Header / Navbar -->
<header class="nav">
  <div class="nav__container">

    <!-- Logo -->
    <a href="{% url 'home' %}" class="nav__logo">
      <img src="{% static 'images/vgh_logo.svg' %}" alt="default" />
    </a>

    <!-- Mobile Toggle -->
    <input type="checkbox" id="nav-toggle" class="nav__checkbox">
    <label for="nav-toggle" class="nav__toggle">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <!-- Navigation -->
    <nav class="nav__menu">
      <a href="">Creators</a>
      <a href="{% url 'products-list' %}">Products</a>
      <div class="nav__dropdown">
        <button class="nav__dropdown-trigger" type="button" aria-haspopup="true">
          Policy
        </button>
        <div class="nav__dropdown-menu" role="menu">
          <a href="#" role="menuitem">Privacy Policy</a>
          <a href="#" role="menuitem">Website Terms and Conditions</a>
          <a href="#" role="menuitem">Delivery / Collection Policy</a>
          <a href="#" role="menuitem">Return Policy</a>
          <a href="#" role="menuitem">Age Disclaimer</a>
          <a href="#" role="menuitem">Product Disclaimer</a>
        </div>
      </div>
      
      {% if request.user.is_authenticated %}
      <a href="">Inbox</a>
      <a href="">Account</a>
      <a href="{% url 'cart' %}" class="nav__cart">
        <i class="fas fa-shopping-cart"></i>Cart
        <span class="cart-count">{{ cart_item_count }}</span>
      </a>
      
      <a href="{% url 'logout' %}" class="btn btn-primary">Logout</a>
      {% else %}
      <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
      {% endif %}
    </nav>

  </div>
</header>
