{% extends "main.html" %}

{% block content %}
<section class="container py-4">
  <div class="card" style="max-width: 620px; margin: 0 auto;">
    <h1>Purchase Gold Points</h1>
    <p>Gold points are charged at <strong>1 point = 1 Rand ({{ points_currency }})</strong>.</p>

    <form method="post" class="form-grid">
      {% csrf_token %}
      <label for="points">Points to purchase</label>
      <input id="points" name="points" type="number" min="1" step="1" required>
      <button type="submit" class="btn btn-primary">Proceed to Stripe Checkout</button>
    </form>

    <a href="{% url 'account' %}" class="btn btn-soft" style="margin-top: 12px;">Back to account</a>
  </div>
</section>
{% endblock %}
